name: UI Deployment Pipeline

on:
  push:
    branches:
      - development
      - main
      - feature/**

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: choice
        options:
          - development
          - production
        required: true

env:
  AWS_REGION: ap-south-1

jobs:

# ------------------------------------------------
# BUILD
# ------------------------------------------------
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +'%Y%m%d')-${GITHUB_SHA:0:7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build app
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            npx ng build --configuration production
          else
            npx ng build --configuration development
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/storescraft/browser


# ------------------------------------------------
# DEPLOY
# ------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_ENV
            echo "BUCKET=mustard-spc-prod-ui-bucket" >> $GITHUB_ENV
            echo "CF_ID=E2P3NOR27KLR8D" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "development" ]]; then
            echo "ENV=development" >> $GITHUB_ENV
            echo "BUCKET=mustard-spc-dev-ui-bucket" >> $GITHUB_ENV
            echo "CF_ID=E2XJ44M2SBBELX" >> $GITHUB_ENV
          else
            echo "ENV=preview" >> $GITHUB_ENV
            echo "BUCKET=mustard-spc-dev-ui-bucket" >> $GITHUB_ENV
            echo "CF_ID=E2XJ44M2SBBELX" >> $GITHUB_ENV
          fi

      - name: Deploy versioned build
        run: |
          VERSION=${{ needs.build.outputs.version }}

          echo "Deploying version $VERSION"

          aws s3 sync dist/browser \
            s3://$BUCKET/releases/$VERSION \
            --delete

      - name: Update current release
        if: env.ENV != 'preview'
        run: |
          VERSION=${{ needs.build.outputs.version }}

          aws s3 sync dist/browser \
            s3://$BUCKET/current \
            --delete

      - name: CloudFront smart invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_ID \
            --paths "/index.html" "/assets/*"

      - name: Deployment summary
        run: |
          echo "Deployment completed"
          echo "Environment: $ENV"
          echo "Version: ${{ needs.build.outputs.version }}"